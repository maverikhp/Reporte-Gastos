<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte Caja Menor Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 15px; background: #e9ecef; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #0056b3; text-align: center; margin-top: 0; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9em; color: #333; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .btn-add { background: #28a745; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; }
        .btn-export { background: #007bff; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-weight: bold; margin-top: 20px; font-size: 16px; }
        .btn-danger { background: #dc3545; color: white; border: none; padding: 10px; width: 100%; border-radius: 6px; margin-top: 10px; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.85em; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #0056b3; color: white; }
        details { margin-top: 15px; background: #f8f9fa; padding: 10px; border-radius: 8px; border: 1px solid #ddd; }
        summary { font-weight: bold; cursor: pointer; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <h2>Registro de Gastos</h2>
    
    <div class="form-group">
        <label>NIT (Escribe para buscar guardados)</label>
        <input type="text" id="nit" placeholder="Ej: 52621734-1" oninput="autocompletarProveedor()">
    </div>

    <div class="form-group">
        <label>Proveedor</label>
        <input type="text" id="proveedor" placeholder="Ej: Ferreter&iacute;a La Roca">
    </div>

    <details>
        <summary>?? Configurar Nuevos Centros de Costo</summary>
        <div style="margin-top: 10px;">
            <input type="text" id="nuevoCodCC" placeholder="C&oacute;digo (ej: 23823...)">
            <input type="text" id="nuevoNomCC" placeholder="Nombre (ej: Papeler&iacute;a)" style="margin-top: 5px;">
            <button onclick="guardarNuevoCC()" style="background: #6c757d; color:white; border:none; padding:8px; width:100%; margin-top:8px; border-radius:4px;">+ Registrar Centro de Costo</button>
        </div>
    </details>

    <div class="form-group" style="margin-top: 15px;">
        <label>Centro de Costo (Busca por nombre o c&oacute;digo)</label>
        <input type="text" id="busquedaCC" placeholder="?? Escribe para buscar..." oninput="filtrarCentros()" style="margin-bottom: 5px;">
        <select id="centroCosto" size="5"></select>
    </div>

    <div class="form-group">
        <label>Descripci&oacute;n</label>
        <input type="text" id="descripcion" placeholder="Ej: Compra de Rastrillos">
    </div>

    <div class="form-group">
        <label>Valor ($)</label>
        <input type="number" id="valor" placeholder="0.00">
    </div>

    <div class="form-group">
		<label>Foto Recibo (C&aacute;mara o Archivo)</label>
		<input type="file" id="foto" accept="image/*">
	</div>

    <button class="btn-add" onclick="agregarGasto()">+ Agregar al Reporte</button>

    <div id="previewArea" style="display:none;">
        <table>
            <thead>
                <tr>
                    <th>Proveedor</th>
                    <th>Centro</th>
                    <th>Valor</th>
                    <th>Borrar</th>
                </tr>
            </thead>
            <tbody id="tablaCuerpo"></tbody>
        </table>
		<div id="galeriaFotos" style="margin-top: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px;">
		</div>
        <button class="btn-export" onclick="exportarExcel()">Generar y Enviar Excel</button>
        <button class="btn-danger" onclick="vaciarTodo()">Borrar Todo el Reporte</button>
    </div>
</div>

<script>
    let listaGastos = JSON.parse(localStorage.getItem('reporteCajaMenor')) || [];
    let misProveedores = JSON.parse(localStorage.getItem('misProveedores')) || {};
    let misCentrosCosto = JSON.parse(localStorage.getItem('misCentrosCosto')) || [
        {cod: "2382300250000101", nom: "Mantenimiento"},
        {cod: "2382301317000104", nom: "Papeler&iacute;a"},
        {cod: "2382300253000401", nom: "Obras Civiles"},
        {cod: "2382301199001004", nom: "Servicios"}
    ];

    document.addEventListener("DOMContentLoaded", () => {
        renderizarCentrosCosto();
        if (listaGastos.length > 0) actualizarTabla();
    });

    function autocompletarProveedor() {
        const nitIngresado = document.getElementById('nit').value.trim();
        if (misProveedores[nitIngresado]) {
            document.getElementById('proveedor').value = misProveedores[nitIngresado];
        }
    }

    function guardarNuevoCC() {
        const cod = document.getElementById('nuevoCodCC').value.trim();
        const nom = document.getElementById('nuevoNomCC').value.trim();
        if(!cod || !nom) return alert("Por favor, llena el c\u00f3digo y el nombre");

        misCentrosCosto.push({cod, nom});
        localStorage.setItem('misCentrosCosto', JSON.stringify(misCentrosCosto));
        renderizarCentrosCosto();
        alert("Centro de costo guardado correctamente");
        document.getElementById('nuevoCodCC').value = "";
        document.getElementById('nuevoNomCC').value = "";
    }

    function renderizarCentrosCosto() {
        const select = document.getElementById('centroCosto');
        select.innerHTML = "";
        misCentrosCosto.forEach(cc => {
            const opt = document.createElement('option');
            opt.value = cc.cod;
            // Usamos una funci\u00f3n para decodificar las entidades en el JS
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = cc.nom;
            opt.textContent = tempDiv.textContent + " (" + cc.cod + ")";
            select.appendChild(opt);
        });
    }

    function filtrarCentros() {
        const busqueda = document.getElementById('busquedaCC').value.toLowerCase();
        const opciones = document.getElementById('centroCosto').options;
        for (let opt of opciones) {
            opt.style.display = opt.text.toLowerCase().includes(busqueda) ? "" : "none";
        }
    }

    // Variable para guardar las im¨˘genes temporalmente en Base64
let fotosGuardadas = [];

function agregarGasto() {
    const prov = document.getElementById('proveedor').value.trim();
    const nit = document.getElementById('nit').value.trim();
    const centro = document.getElementById('centroCosto').value;
    const desc = document.getElementById('descripcion').value.trim();
    const val = parseFloat(document.getElementById('valor').value);
    const fotoInput = document.getElementById('foto');
    
    if(!prov || !val || !nit || !centro) return alert("Proveedor, NIT, Centro de Costo y Valor son obligatorios");

    // Guardar Proveedor si no existe
    if (!misProveedores[nit]) {
        misProveedores[nit] = prov;
        localStorage.setItem('misProveedores', JSON.stringify(misProveedores));
    }

    const nuevoGasto = {
        "Proveedor": prov,
        "NIT": nit,
        "Centro de costo": centro,
        "Descripci\u00f3n": desc,
        "Valores": val
    };

    // Procesar la foto si existe
    if (fotoInput.files && fotoInput.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
            // Guardamos la imagen en la lista de fotos
            fotosGuardadas.push(e.target.result);
            listaGastos.push(nuevoGasto);
            localStorage.setItem('reporteCajaMenor', JSON.stringify(listaGastos));
            // Tambi¨¦n guardamos las fotos (Cuidado: LocalStorage tiene l¨Şmite de ~5MB)
            localStorage.setItem('fotosCajaMenor', JSON.stringify(fotosGuardadas));
            
            actualizarTabla();
            renderizarGaleria();
            limpiarFormulario();
        };
        reader.readAsDataURL(fotoInput.files[0]);
    } else {
        alert("Es recomendable adjuntar una foto del recibo.");
        // Si decides permitirlo sin foto, descomenta estas l¨Şneas:
        // listaGastos.push(nuevoGasto);
        // guardarEnMemoria();
        // actualizarTabla();
        // limpiarFormulario();
    }
}

function renderizarGaleria() {
    const contenedor = document.getElementById('galeriaFotos');
    const fotosCargadas = JSON.parse(localStorage.getItem('fotosCajaMenor')) || [];
    contenedor.innerHTML = "";
    
    fotosCargadas.forEach((foto, index) => {
        const img = document.createElement('img');
        img.src = foto;
        img.style.width = "100%";
        img.style.borderRadius = "8px";
        img.style.border = "2px solid #0056b3";
        img.onclick = () => window.open(foto); // Al tocarla se abre en grande
        contenedor.appendChild(img);
    });
}

    function actualizarTabla() {
        const cuerpo = document.getElementById('tablaCuerpo');
        cuerpo.innerHTML = "";
        document.getElementById('previewArea').style.display = "block";

        listaGastos.forEach((g, index) => {
            cuerpo.innerHTML += "<tr>" +
                "<td>" + g.Proveedor + "</td>" +
                "<td>" + g["Centro de costo"] + "</td>" +
                "<td>$" + g.Valores.toLocaleString() + "</td>" +
                "<td><button onclick='eliminarGasto(" + index + ")' style='background:red; color:white; border:none; border-radius:4px; padding: 2px 8px;'>X</button></td>" +
            "</tr>";
        });
    }

    function eliminarGasto(index) {
        if(confirm("\u00bfDeseas eliminar este registro?")) {
            listaGastos.splice(index, 1);
            localStorage.setItem('reporteCajaMenor', JSON.stringify(listaGastos));
            actualizarTabla();
            if(listaGastos.length === 0) document.getElementById('previewArea').style.display = "none";
        }
    }

    function exportarExcel() {
        if (listaGastos.length === 0) return alert("No hay gastos para exportar");
        const total = listaGastos.reduce((sum, g) => sum + g.Valores, 0);
        const reporteFinal = listaGastos.map(g => ({
            "Proveedor": g.Proveedor,
            "NIT": g.NIT,
            "Centro de costo": g["Centro de costo"],
            "Descripci\u00f3n": g["Descripci\u00f3n"],
            "Valores": g.Valores
        }));
        reporteFinal.push({ "Proveedor": "GRAND TOTAL", "Valores": total });

        const ws = XLSX.utils.json_to_sheet(reporteFinal);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Reporte_Caja");
        XLSX.writeFile(wb, "Solicitud_Reembolso.xlsx");
        
        window.location.href = "mailto:contabilidad@empresa.com?subject=Reembolso Caja Menor&body=Hola, adjunto env\u00edo el reporte por un total de $" + total.toLocaleString();
    }

    function vaciarTodo() {
        if(confirm("\u00bfEst\u00e1s seguro de borrar todo el reporte actual?")) {
            listaGastos = [];
            localStorage.removeItem('reporteCajaMenor');
            actualizarTabla();
            document.getElementById('previewArea').style.display = "none";
        }
    }

    function limpiarFormulario() {
        document.getElementById('proveedor').value = "";
        document.getElementById('nit').value = "";
        document.getElementById('descripcion').value = "";
        document.getElementById('valor').value = "";
        document.getElementById('busquedaCC').value = "";
        renderizarCentrosCosto();
    }
</script>
</body>
</html>
